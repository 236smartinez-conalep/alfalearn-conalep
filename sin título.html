<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka',sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:
radial-gradient(circle at top,#1e3a8a,#0f172a 70%);
color:white;
position:relative;
}

/* ESTRELLAS */

body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
opacity:.15;
animation:stars 20s linear infinite;
pointer-events:none;
}

@keyframes stars{
from{
transform:translateY(0);
}
to{
transform:translateY(40px);
}
}

/* TITULO */

.pixel{
font-family:'Press Start 2P',cursive;
}

.glow{
color:#facc15;
text-shadow:
0 0 10px #facc15,
0 0 20px #facc15,
0 0 40px #f59e0b;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
text-shadow:
0 0 15px #facc15,
0 0 35px #facc15,
0 0 60px #f59e0b;
}
}

/* TARJETAS */

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.15);
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

/* BOTONES */

.btn{
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.btn-play{
background:
linear-gradient(
135deg,
#facc15,
#f59e0b
);
color:white;
font-size:1.4rem;
font-weight:bold;
border:none;
border-radius:20px;
padding:18px 40px;
box-shadow:
0 10px 30px rgba(250,204,21,.4);
cursor:pointer;
}

/* LOGOS */

.logo-box{
width:120px;
height:120px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
padding:10px;
box-shadow:
0 0 20px #38bdf8;
}

/* ICONOS FLOTANTES */

.float{
position:absolute;
font-size:50px;
opacity:.35;
animation:float 4s ease-in-out infinite;
}

.f1{
top:12%;
left:8%;
}

.f2{
top:15%;
right:8%;
}

.f3{
bottom:20%;
left:10%;
}

.f4{
bottom:22%;
right:10%;
}

@keyframes float{
50%{
transform:translateY(-15px);
}
}

/* PANEL PRINCIPAL */

.home-panel{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
text-align:center;
padding:20px;
}

.subtitle{
font-size:1.3rem;
opacity:.9;
}

  </style>

            const games = gamesByLevel[level];

            document.getElementById("app").innerHTML = `

            <div class="min-h-screen p-6">

            <button
            onclick="renderLevels()"
            class="mb-6">

            ← Volver

            </button>

            <h1 class="text-3xl font-bold mb-8 text-center">

            Juegos

            </h1>

            <div class="grid gap-4 max-w-lg mx-auto">

            ${games.map(game => `

                <button
                onclick="startGame('${game.id}')"
                class="card p-5 rounded-3xl text-left"
                style="background:${config.secondary}">

                <span class="text-3xl">

                ${game.emoji}

                </span>

                <span class="text-xl ml-3">

                ${game.name}

                </span>

                </button>

                `).join('')}

            </div>

            </div>

            `;
        }

        /* =========================================================
   FLUJO: INICIAR PARTIDA
========================================================= */

        function startGame(game) {

            currentGame = game;

            gameState = {

                score: 0,
                round: 0,
                lives: 3

            };

            renderSimpleGame();
        }

        /* =========================================================
   VISTA: ESTRUCTURA JUEGO EN CURSO
========================================================= */

        function renderSimpleGame() {

            const data = gameContent[currentGame];

            if (gameState.round >= data.length) {

                finishGame();
                return;

            }

            const item = data[gameState.round];

            document.getElementById("app").innerHTML = `

            <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

            <h1 class="text-4xl font-bold mb-6">

            🎮 ${currentGame.replaceAll('_', ' ')}

            </h1>

            <div class="mb-4 text-xl">

            ⭐ ${gameState.score}

            </div>

            <div class="mb-8 text-xl">

            ❤️ ${gameState.lives}

            </div>

            <div class="w-full max-w-xl rounded-3xl p-8"
            style="background:${config.secondary}">

            ${renderGameContent(item)}

            </div>

            </div>

            `;
        }

        /* =========================================================
   RENDER DEL CONTENIDO DINÁMICO (PREGUNTA + RECUADRO OPCIONES)
========================================================= */

        function renderGameContent(item) {

            return `

            <div>

            <h2 class="text-2xl font-bold mb-4">

            ${item.question}

            </h2>

            ${item.text ? `

            <div class="bg-black/30 p-4 rounded-2xl mb-6 text-xl">

            ${item.text}

            </div>

            `: ''}

            <!-- Apartado de recuadro para las opciones -->
            <div id="options-container" class="flex flex-col gap-4 p-4 bg-black/20 rounded-2xl border border-indigo-500/30">

            ${item.options.map(option => `

                <button
                onclick="checkAnswer(this, '${option}', '${item.answer}')"
                class="btn bg-indigo-700 hover:bg-indigo-500 p-4 rounded-2xl text-lg w-full font-medium text-white shadow-md">

                ${option}

                </button>

                `).join('')}

            </div>
            <!-- Recuadro para marcar si la respuesta es Correcta o Incorrecta -->
            <div id="feedback-box" class="mt-6 hidden p-4 rounded-2xl text-xl font-bold transition-all duration-300"></div>

            </div>

            `;
        }

        /* =========================================================
   PROCESAMIENTO DE RESPUESTAS Y FEEDBACK VISUAL
========================================================= */

        function checkAnswer(buttonElement, selected, correct) {

            // Desactivar todos los botones para evitar clicks múltiples durante la animación
            const buttons = document.querySelectorAll("#options-container button");
            buttons.forEach(btn => btn.disabled = true);

            const feedbackBox = document.getElementById("feedback-box");
            feedbackBox.classList.remove("hidden");

            if (selected === correct) {

                // Opción seleccionada se ilumina en verde
                buttonElement.style.backgroundColor = config.success;

                // Configuración visual del recuadro de estado (Fondo verde opaco)
                feedbackBox.style.backgroundColor = "rgba(22, 163, 74, 0.2)";
                feedbackBox.style.border = `2px solid ${config.success}`;
                feedbackBox.style.color = "#4ade80";
                feedbackBox.innerHTML = "✨ ¡Correcto! +10 puntos";

                gameState.score += 10;

            } else {

                // Opción seleccionada se ilumina en rojo
                buttonElement.style.backgroundColor = config.danger;

                // Se le muestra al alumno sutilmente cuál era la correcta marcándola en verde
                buttons.forEach(btn => {
                    if (btn.innerText.trim() === correct) {
                        btn.style.backgroundColor = config.success;
                    }
                });

                // Configuración visual del recuadro de estado (Fondo rojo opaco)
                feedbackBox.style.backgroundColor = "rgba(220, 38, 38, 0.2)";
                feedbackBox.style.border = `2px solid ${config.danger}`;
                feedbackBox.style.color = "#f87171";
                feedbackBox.innerHTML = "❌ ¡Incorrecto! Perdiste una vida";
                gameState.lives--;
            }
            // Avanzar la ronda
            gameState.round++;

            // Pausa de 1.2 segundos para asimilar la respuesta antes de redibujar la pantalla
            setTimeout(()=> {

                if (gameState.lives <= 0 || gameState.round >= gameContent[currentGame].length) {
                    finishGame();
                } else {
                    renderSimpleGame();
                }
            },
                1200);
        }
        /* =========================================================
   VISTA: PANTALLA FINAL
========================================================= */

        function finishGame() {

            document.getElementById("app").innerHTML = `

            <div class="min-h-screen flex flex-col items-center justify-center text-center p-6">

            <h1 class="text-5xl font-bold mb-6">

            🎉 Juego Terminado

            </h1>

            <div class="text-3xl mb-8">

            ⭐ ${gameState.score} puntos

            </div>
            <div class="flex gap-4">
            <button
            onclick="startGame(currentGame)"
            class="btn bg-green-600 px-6 py-3 rounded-2xl">
            Reintentar
            </button>
            <button
            onclick="renderGames(currentLevel)"
            class="btn bg-indigo-700 px-6 py-3 rounded-2xl">
            Volver
            </button>
            </div>
            </div>
            `;
        }
        /* =========================================================
   ARRANQUE DE LA APLICACIÓN
========================================================= */

        renderHome();

    </script>

</body>
</html>
